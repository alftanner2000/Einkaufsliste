<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hausboot Crew Einkaufsliste</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      color: #f8fafc;
      background:
        linear-gradient(rgba(0,0,0,0.18), rgba(0,0,0,0.3)),
        linear-gradient(180deg,#7cc7ff 0%, #4ea8de 35%, #1b4965 100%);
      overflow-x: hidden;
      position: relative;
      padding: 20px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.18), transparent 25%),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,0.15), transparent 20%);
      pointer-events: none;
    }

    .waves {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 200%;
      height: 220px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.16), transparent 55%);
      animation: waveMove 12s linear infinite;
      opacity: 0.55;
      pointer-events: none;
    }

    @keyframes waveMove {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .app {
      position: relative;
      z-index: 2;
      max-width: 760px;
      margin: 0 auto;
      backdrop-filter: blur(10px);
      background: rgba(10, 25, 40, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .hero {
      padding: 34px 28px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }

    .boat {
      position: absolute;
      right: 24px;
      top: 20px;
      font-size: 3rem;
      animation: floatBoat 4s ease-in-out infinite;
    }

    @keyframes floatBoat {
      0% { transform: translateY(0px) rotate(-2deg); }
      50% { transform: translateY(6px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(-2deg); }
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2.1rem;
    }

    .subtitle {
      color: #dbeafe;
      line-height: 1.5;
      max-width: 520px;
    }

    .content {
      padding: 24px;
    }

    .inputRow {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    input {
      flex: 1;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 1rem;
      background: rgba(255,255,255,0.92);
      color: #111827;
      outline: none;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 16px 18px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: 0.2s;
    }

    .addBtn {
      background: linear-gradient(135deg,#f59e0b,#f97316);
      color: white;
      min-width: 70px;
      box-shadow: 0 10px 20px rgba(249,115,22,0.25);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(5px);
    }

    .itemText {
      flex: 1;
      font-size: 1.05rem;
    }

    .done .itemText {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .smallBtn {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.18);
      color: white;
    }

    .delete {
      background: rgba(239,68,68,0.9);
    }

    .status {
      margin-top: 20px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(16,185,129,0.16);
      color: #d1fae5;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      color: #bfdbfe;
      font-size: 0.9rem;
      opacity: 0.9;
    }

    @media (max-width: 700px) {
      .inputRow {
        flex-direction: column;
      }

      .addBtn {
        width: 100%;
      }

      .boat {
        font-size: 2.2rem;
      }

      h1 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>

<body>

<div class="waves"></div>

<main class="app">

  <section class="hero">
    <div class="boat">🚤</div>
    <h1>⚓ Hausboot Crew Einkaufsliste</h1>
    <div class="subtitle">
      Gemeinsame Live-Einkaufsliste für euren Hausboot-Trip. <br>
      Alle Änderungen werden automatisch gespeichert und mit der Crew synchronisiert.
    </div>
  </section>

  <section class="content">

    <div class="inputRow">
      <input id="itemInput" placeholder="z. B. Grillfleisch, Bier, Angelzeug, Sonnencreme …" autocomplete="off">
      <button class="addBtn" id="addBtn">+ Hinzufügen</button>
    </div>

    <ul id="list"></ul>

    <div class="status" id="status">
      Verbinde mit Firebase …
    </div>

    <div class="footer">
      🌊 Crew Sync aktiv • Hausboot Modus 🚤
    </div>

  </section>

</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

  import {
    getFirestore,
    collection,
    addDoc,
    deleteDoc,
    updateDoc,
    doc,
    onSnapshot,
    query,
    orderBy,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgYYYooJUztpjQmkheZuSEXCMmQ9gay7g",
    authDomain: "einkaufsliste-33d2b.firebaseapp.com",
    projectId: "einkaufsliste-33d2b",
    storageBucket: "einkaufsliste-33d2b.firebasestorage.app",
    messagingSenderId: "843365397590",
    appId: "1:843365397590:web:aca98ab80456ce6e8c77f7",
    measurementId: "G-HSZF25ZM58"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const einkaufRef = collection(db, "einkaufsliste");

  const input = document.getElementById("itemInput");
  const addBtn = document.getElementById("addBtn");
  const list = document.getElementById("list");
  const status = document.getElementById("status");

  async function addItem() {
    const text = input.value.trim();

    if (!text) return;

    input.value = "";

    await addDoc(einkaufRef, {
      text,
      done: false,
      createdAt: serverTimestamp()
    });
  }

  addBtn.addEventListener("click", addItem);

  input.addEventListener("keydown", (event) => {
    if (event.key === "Enter") addItem();
  });

  const q = query(einkaufRef, orderBy("createdAt", "asc"));

  onSnapshot(q, (snapshot) => {

    list.innerHTML = "";

    if (snapshot.empty) {
      list.innerHTML = `
        <li>
          <span class="itemText">🚤 Noch keine Crew-Einkäufe eingetragen.</span>
        </li>
      `;
    }

    snapshot.forEach((documentSnapshot) => {

      const item = documentSnapshot.data();
      const id = documentSnapshot.id;

      const li = document.createElement("li");

      if (item.done) li.classList.add("done");

      const textSpan = document.createElement("span");
      textSpan.className = "itemText";
      textSpan.textContent = item.text;

      const doneBtn = document.createElement("button");
      doneBtn.className = "smallBtn";
      doneBtn.textContent = item.done ? "↩" : "✓";

      doneBtn.onclick = () => {
        updateDoc(doc(db, "einkaufsliste", id), {
          done: !item.done
        });
      };

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "smallBtn delete";
      deleteBtn.textContent = "X";

      deleteBtn.onclick = () => {
        deleteDoc(doc(db, "einkaufsliste", id));
      };

      li.appendChild(textSpan);
      li.appendChild(doneBtn);
      li.appendChild(deleteBtn);

      list.appendChild(li);
    });

    status.textContent =
      "⚓ Live verbunden – alle Änderungen werden automatisch gespeichert.";

  }, (error) => {

    status.textContent =
      "Fehler bei Firebase – prüfe Firestore-Regeln oder Verbindung.";

    console.error(error);
  });
</script>

</body>
</html>
